<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" width="400" height="120">
  <defs>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0380a"/>
      <stop offset="100%" style="stop-color:#8a2208"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ece0"/>
      <stop offset="100%" style="stop-color:#d8d0b8"/>
    </linearGradient>
  </defs>

  <!-- House icon -->
  <!-- Roof -->
  <polygon points="8,52 50,8 92,52" fill="url(#roofGrad)"/>
  <!-- Roof edge -->
  <rect x="8" y="50" width="84" height="5" rx="1" fill="#6a1808"/>
  <!-- Wall -->
  <rect x="18" y="54" width="64" height="56" fill="url(#wallGrad)"/>
  <!-- Left window -->
  <rect x="26" y="66" width="18" height="20" rx="2" fill="#0E1209"/>
  <rect x="28" y="68" width="14" height="16" rx="1" fill="#F2A800" opacity="0.8"/>
  <line x1="35" y1="68" x2="35" y2="84" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="28" y1="76" x2="42" y2="76" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Right window -->
  <rect x="56" y="66" width="18" height="20" rx="2" fill="#0E1209"/>
  <rect x="58" y="68" width="14" height="16" rx="1" fill="#F2A800" opacity="0.6"/>
  <line x1="65" y1="68" x2="65" y2="84" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="58" y1="76" x2="72" y2="76" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- Door -->
  <rect x="36" y="84" width="28" height="26" rx="2" fill="#2a1808"/>
  <circle cx="61" cy="99" r="2.5" fill="#F2A800"/>
  <!-- Chimney -->
  <rect x="60" y="22" width="10" height="22" fill="#7a3820"/>
  <rect x="57" y="19" width="16" height="6" rx="1" fill="#8a4830"/>
  <!-- Gold ridge cap -->
  <circle cx="50" cy="8" r="4" fill="#F2A800"/>

  <!-- BRAND TEXT -->
  <!-- NytTag -->
  <text x="110" y="62" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#0E1209" font-weight="400" letter-spacing="-0.5">NytTag</text>
  <!-- Tilbud in gold -->
  <text x="110" y="100" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#F2A800" font-weight="400" letter-spacing="-0.5">Tilbud</text>
  <!-- .com suffix -->
  <text x="325" y="100" font-family="'Courier New', monospace" font-size="18" fill="#637055" letter-spacing="1">.com</text>

  <!-- Tagline -->
  <text x="111" y="115" font-family="Arial, sans-serif" font-size="11" fill="#637055" letter-spacing="2.5">3 GRATIS TILBUD · HELE DANMARK</text>
</svg>
