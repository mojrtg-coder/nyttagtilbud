<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
  <defs>
    <linearGradient id="roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d03808"/>
      <stop offset="100%" style="stop-color:#8a2208"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E1209"/>
      <stop offset="100%" style="stop-color:#1A3A10"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- House -->
  <!-- Roof -->
  <polygon points="2,17 16,4 30,17" fill="url(#roof)"/>
  <!-- Roof edge -->
  <rect x="2" y="16" width="28" height="3" rx="1" fill="#6a1808"/>
  <!-- Wall -->
  <rect x="6" y="18" width="20" height="12" fill="#e8e4d0"/>
  <!-- Windows -->
  <rect x="8" y="21" width="5" height="5" rx="1" fill="#0E1209"/>
  <rect x="9" y="22" width="3" height="3" fill="#F2A800" opacity="0.9"/>
  <rect x="19" y="21" width="5" height="5" rx="1" fill="#0E1209"/>
  <rect x="20" y="22" width="3" height="3" fill="#F2A800" opacity="0.7"/>
  <!-- Door -->
  <rect x="13" y="23" width="6" height="7" rx="1" fill="#3a1808"/>
  <!-- Gold dot on roof peak -->
  <circle cx="16" cy="4" r="2.5" fill="#F2A800"/>
  <!-- Gold line at bottom -->
  <rect x="0" y="29" width="32" height="3" rx="0" fill="#F2A800" opacity="0.8"/>
</svg>
